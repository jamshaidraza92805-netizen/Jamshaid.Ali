###########################################################
### Jamshaid Ali - Computer Engineering Portfolio
### Roll Number: 2025-BSCPE-165
###########################################################

# --- Required options --- #
title: "Jamshaid Ali | Portfolio"
author: "Jamshaid Ali"

# --- Navigation Bar (The 4 Required Pages) --- #
navbar-links:
  Home: ""             # Your main landing page (Fixed info)
  About: "about"       # About page
  Contact Us: "contact" # Contact page
  Blog: "blog"         # Page containing all your posts

# --- Logo --- #
avatar: "/assets/img/avatar-icon.png"
round-avatar: true

# --- Footer & RSS --- #
social-network-links:
  email: "your.email@example.com"
  github: "your-github-username"
  linkedin: "your-linkedin-username"

rss-description: "Jamshaid Ali | Dept: Computer Engineering | Roll No: 2025-BSCPE-165"

# --- General options --- #
# Crucial: This moves post listing from home to the /blog page
paginate_path: "/blog/page:num/"

url-pretty: "JamshaidAli.com"
title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: true

# --- Colours --- #
page-col: "#FFFFFF"
text-col: "#333333"
link-col: "#1A73E8"
hover-col: "#1557B0"

# --- Misc --- #
timezone: "Asia/Karachi"
date_format: "%B %-d, %Y"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  - scope:
      path: ""
    values:
      layout: "page"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
