###########################################################
### Updated Beautiful Jekyll Configuration
###########################################################

############################
# --- Required options --- #
############################

title: "My Professional Portfolio"
author: "Your Name"
timezone: "America/Toronto"

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  About Me: "aboutme"
  Blog: "index"
  Resources:
    - Beautiful Jekyll: "https://beautifuljekyll.com"
    - Learn Markdown: "https://www.markdowntutorial.com/"
  Contact: "contact"

################
# --- Logo --- #
################

avatar: "/assets/img/avatar-icon.png"
round-avatar: true

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  email: "your-email@example.com"
  github: "your-github-username"
  linkedin: "your-linkedin-username"
  twitter: "your-twitter-handle"
  rss: true

rss-description: "Insights and projects from my professional journey."

###########################
# --- General options --- #
###########################

# Social sharing settings
share-links-active:
  twitter: true
  facebook: true
  linkedin: true
  vk: false
  reddit: true

url-pretty: "yourdomain.com"
title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: true

######################################
# --- Colours / Personalization --- #
######################################

page-col: "#FFFFFF"
text-col: "#333333"
link-col: "#007BFF"     # A clean professional blue
hover-col: "#0056B3"
navbar-col: "#F8F9FA"
navbar-text-col: "#333333"
footer-col: "#F8F9FA"

# Mobile browser theme color
mobile-theme-col: "#007BFF"

####################
# --- Comments --- #
####################

# Recommendation: Use Giscus or Utterances (GitHub-based) for a developer blog
# utterances:
#   repository: "your-github-username/your-repo-name"
#   issue-term: title
#   theme: github-light

#################################################################################
# --- Technical Settings (Leave as is unless advanced user) --- #
#################################################################################

markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
